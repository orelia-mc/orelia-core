# Job definitions (SOW section 9). allowed-weapons restricts which WeaponType a player
# with this job may fight with; passive-bonus is a flat stat bonus applied while the job
# is active.

jobs:
  FENCER:
    display-name: "フェンサー"
    allowed-weapons:
      - SWORD
    passive-bonus:
      ATK: 2

  WARRIOR:
    display-name: "ウォーリアー"
    allowed-weapons:
      - AXE
    passive-bonus:
      ATK: 3
      DEF: 1

  ARCHER:
    display-name: "アーチャー"
    allowed-weapons:
      - BOW

  MINER:
    display-name: "採掘師"
    allowed-weapons:
      - PICKAXE

  FARMER:
    display-name: "農民"
    allowed-weapons:
      - HOE

  WOODCUTTER:
    display-name: "木こり"
    allowed-weapons:
      - HATCHET
