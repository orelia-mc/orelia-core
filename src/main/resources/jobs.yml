# Job definitions (SOW section 9). allowed-weapons restricts which WeaponType a player
# with this job may fight with; passive-bonus is a flat stat bonus applied while the job
# is active.

jobs:
  SWORDSMAN:
    display-name: "剣士"
    allowed-weapons:
      - SWORD
    passive-bonus:
      ATK: 2

  SPEARMAN:
    display-name: "槍使い"
    allowed-weapons:
      - SPEAR
    passive-bonus:
      ATK: 1

  WARRIOR:
    display-name: "戦士"
    allowed-weapons:
      - AXE
      - SWORD
    passive-bonus:
      ATK: 3
      DEF: 1

  ARCHER:
    display-name: "弓使い"
    allowed-weapons:
      - BOW
    passive-bonus:
      BOW_ATK: 3
