name: OreliaCore
version: '${version}'
main: rpg.core.OreliaPlugin
api-version: '1.21'
author: rasp1220
description: RPG foundation plugin (combat, player, status) - weapons, skills, jobs, status, accessories, monsters, bosses, effects, economy, GUI, database, public API
folia-supported: false

softdepend: [WorldGuard]

commands:
  ol:
    description: Orelia player commands (item, job, status, and more registered by orelia-world/orelia-extra)
    usage: /ol <item|job|status|...> ...
  oladmin:
    description: Orelia admin commands (reload, spawn, spawnpoint, and more registered by orelia-world/orelia-extra)
    usage: /oladmin <reload|spawn <monsterId>|spawnboss <bossId>|spawnpoint <add|remove|list>|...>
    permission: orelia.admin
    permission-message: "&c権限がありません。このコマンドは運営(OP)専用です。"

permissions:
  orelia.admin:
    default: op
