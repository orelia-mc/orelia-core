# Weapon definitions (SOW section 6). Add a new weapon by adding a new key under
# `weapons:` - no code change required.
#
# weapon-type: SWORD | SPEAR | AXE | BOW | PICKAXE | HOE | HATCHET
# rarity: COMMON | UNCOMMON | RARE | EPIC | LEGENDARY
# element: NONE | FIRE | WATER | EARTH | WIND | LIGHT | DARK
# required-job: FENCER | WARRIOR | ARCHER | MINER | FARMER | WOODCUTTER (blank = any job may use it)
# unbreakable: true | false (default false) - vanilla's own "Unbreakable" flag, the item never
#   loses durability no matter how it's used.
# bulk-chop-radius: (HATCHET only, default 0) radius of the automatic bulk-chop sweep this axe
#   grants on every break - no sneaking required. 0 = no bulk chop (single-block only),
#   1 = 3x3, 2 = 5x5, etc. Ignored for other weapon-types.
# gather-required-level: (HATCHET only, default 0) minimum 木こり(WOODCUTTING) job level
#   (the gathering module's own level, not character level) required to chop with this axe at
#   all - below this, breaking any configured wood block while holding this axe is blocked
#   entirely (single-block break included). 0 = no restriction. Ignored for other weapon-types.
#
# Note: AXE (warrior) and HATCHET (woodcutter) are deliberately separate weapon-types even
# though they render with the same vanilla axe materials - what a given ItemStack "is" comes
# entirely from the id (this section's key) stamped onto it as a hidden tag when created, not
# from its visible Material, so the two never get confused with each other or with a plain
# vanilla axe/pickaxe/hoe a player is holding for ordinary block-breaking.

