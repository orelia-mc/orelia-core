# Monster definitions (SOW section 13). entity-type must be a valid org.bukkit.entity.EntityType.
# ai-type: PASSIVE | AGGRESSIVE | RANGED
# weakness: optional ElementType (NONE by default). A weapon whose element matches deals
# a flat x1.5 damage multiplier (CombatDamageListener); any other weapon (including NONE)
# deals normal (x1.0) damage.
# Each drop entry sets either weapon-id (an items.yml id) or vanilla-material (a Material name).
# crit-rate: optional percent chance (0-100) this monster's attacks crit (default 0 = never).
# crit-multiplier: optional multiplier applied on a crit (default 1.5, only matters if crit-rate > 0).
# abilities: optional periodic attacks cast at nearby players (MonsterAbilityCastService), same
# shape as bosses.yml's own abilities block: type is AOE_SLAM or FIREBALL_BARRAGE, damage/radius/
# cooldown-seconds/particle/sound/announce-message. Do not configure abilities here for a monster
# id that's also referenced by bosses.yml's monster-id (goblin_king, flame_lord below) - that
# entity spawns through the separate boss ability system instead when spawned as a boss.

monsters:
  forest_slime:
    name: "森のスライム"
    entity-type: SLIME
    hp: 15
    attack-power: 2
    defense: 0
    element: NONE
    weakness: FIRE
    ai-type: AGGRESSIVE
    exp-reward: 5
    money-min: 1
    money-max: 3
    drops:
      slime_ball:
        vanilla-material: SLIME_BALL
        chance-percent: 60
        min-amount: 1
        max-amount: 2

  goblin_raider:
    name: "ゴブリンの略奪者"
    entity-type: ZOMBIE
    hp: 40
    attack-power: 5
    defense: 2
    element: NONE
    ai-type: AGGRESSIVE
    exp-reward: 15
    money-min: 5
    money-max: 12
    drops:
      rotten_flesh:
        vanilla-material: ROTTEN_FLESH
        chance-percent: 80
        min-amount: 1
        max-amount: 2
      training_sword:
        weapon-id: wooden_training_sword
        chance-percent: 5
        min-amount: 1
        max-amount: 1
    abilities:
      war_cry_slam:
        name: "雄叫びの一撃"
        type: AOE_SLAM
        damage: 8
        radius: 3
        cooldown-seconds: 10
        particle: SWEEP_ATTACK
        sound: ENTITY_ZOMBIE_ATTACK_WOODEN_DOOR
        announce-message: "&%eゴブリンの略奪者が雄叫びを上げた！"

  skeletal_archer:
    name: "骸骨の弓兵"
    entity-type: SKELETON
    hp: 30
    attack-power: 4
    defense: 1
    element: NONE
    ai-type: RANGED
    exp-reward: 18
    money-min: 6
    money-max: 14
    drops:
      arrow:
        vanilla-material: ARROW
        chance-percent: 70
        min-amount: 2
        max-amount: 5
    abilities:
      numbing_volley:
        name: "痺れ矢の乱射"
        type: AOE_SLAM
        damage: 6
        radius: 4
        cooldown-seconds: 12
        particle: CRIT
        sound: ENTITY_SKELETON_SHOOT
        announce-message: "&%7骸骨の弓兵が矢を乱射した！"

  goblin_king:
    name: "ゴブリンキング"
    entity-type: ZOMBIE
    hp: 400
    attack-power: 12
    defense: 5
    element: NONE
    ai-type: AGGRESSIVE
    exp-reward: 200
    money-min: 100
    money-max: 250
    drops:
      flame_longsword:
        weapon-id: flame_longsword
        chance-percent: 15
        min-amount: 1
        max-amount: 1
      emerald:
        vanilla-material: EMERALD
        chance-percent: 100
        min-amount: 3
        max-amount: 8

  flame_lord:
    name: "業火の王ブレイズロード"
    entity-type: BLAZE
    hp: 600
    attack-power: 15
    defense: 8
    element: FIRE
    ai-type: AGGRESSIVE
    exp-reward: 800
    money-min: 300
    money-max: 600
    drops:
      blaze_rod:
        vanilla-material: BLAZE_ROD
        chance-percent: 100
        min-amount: 2
        max-amount: 5
      emerald:
        vanilla-material: EMERALD
        chance-percent: 60
        min-amount: 5
        max-amount: 15
