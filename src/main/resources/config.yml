# Orelia core configuration.
# Reload with: /rpgadmin reload

database:
  # SQLITE or MYSQL
  type: SQLITE
  sqlite:
    file: orelia.db
  mysql:
    host: localhost
    port: 3306
    database: orelia
    username: orelia
    password: ""
    use-ssl: false

status:
  regen:
    hp-percent-per-tick: 0.5
    sp-percent-per-tick: 1.0
    # 100 ticks = 5 seconds
    period-ticks: 100
  leveling:
    exp-per-level: 100
    max-level: 100
  # Base value and per-level growth for each stat, used to compute base stats at a given level.
  growth:
    HP:
      base: 100
      per-level: 10
    SP:
      base: 50
      per-level: 5
    ATK:
      base: 5
      per-level: 1
    DEF:
      base: 5
      per-level: 1
    AGI:
      base: 5
      per-level: 1
    DEX:
      base: 5
      per-level: 1
    INT:
      base: 5
      per-level: 1
    CRT:
      base: 5
      per-level: 1
    CRT_DMG:
      base: 5
      per-level: 1
    SPD:
      base: 5
      per-level: 1

economy:
  starting-balance: 100.0
