# Orelia core configuration.
# Reload with: /oladmin reload
#
# config-version tracks this file's schema. Bump it whenever a new top-level section is
# added - on next startup, ConfigManager appends the new section (with its comments) to any
# existing config.yml that's missing it, without touching anything you've already customized.
# Never bump this for a value-only change (e.g. tweaking a default), only for new/removed keys.
config-version: 1

database:
  # SQLITE or MYSQL
  type: SQLITE
  sqlite:
    file: orelia.db
  mysql:
    host: localhost
    port: 3306
    database: orelia
    username: orelia
    password: ""
    use-ssl: false

status:
  regen:
    hp-percent-per-tick: 0.5
    sp-percent-per-tick: 1.0
    # 100 ticks = 5 seconds
    period-ticks: 100
  leveling:
    exp-per-level: 100
    max-level: 100
  # Base value and per-level growth for each stat, used to compute base stats at a given level.
  growth:
    HP:
      base: 100
      per-level: 10
    SP:
      base: 50
      per-level: 5
    ATK:
      base: 5
      per-level: 1
    DEF:
      base: 5
      per-level: 1
    CRT:
      base: 5
      per-level: 1
    CRT_DMG:
      base: 5
      per-level: 1
    SPD:
      base: 5
      per-level: 1

economy:
  starting-balance: 100.0

# Floating damage-number text (rises for duration-ticks then despawns). Works for any hit,
# not just monsters - PvP included.
combat:
  damage-display:
    enabled: true
    duration-ticks: 20
    rise-per-tick: 0.05
    # Spawn offset from the hit location (victim's eye height by default) - negative moves it
    # down. Tune this if numbers feel like they're floating too high above the target.
    y-offset: -0.3
    normal-color: "&f"
    crit-color: "&6"
    crit-scale: 1.3

monster:
  # Cancels vanilla natural/spawner hostile mob spawning so every enemy in the world comes
  # from an Orelia monster spawn point (/oladmin spawnpoint) instead of random vanilla
  # spawns. Does not affect passive animals or Orelia's own spawns.
  disable-vanilla-hostile-spawning: true
  # Prevents tagged monsters (zombies etc.) from burning in daylight, without affecting
  # other ignition sources (lava, fire blocks, fire-elemental skills).
  sun-immunity:
    enabled: true
  # Renders every tagged monster's nametag as a live HP bar, updated after each hit
  # (MonsterHealthBarListener). {name}/{bar}/{current}/{max} placeholders in "format".
  health-bar:
    enabled: true
    length: 10
    format: "{name} &7[{bar}&7] &f{current}/{max}"
    filled-color: "&a"
    empty-color: "&8"
