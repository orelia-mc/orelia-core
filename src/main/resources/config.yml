# Orelia core configuration.
# Reload with: /oladmin reload
#
# config-version tracks this file's schema. Bump it whenever a new top-level section is
# added - on next startup, ConfigManager appends the new section (with its comments) to any
# existing config.yml that's missing it, without touching anything you've already customized.
# Never bump this for a value-only change (e.g. tweaking a default), only for new/removed keys.
config-version: 2

database:
  # SQLITE or MYSQL
  type: SQLITE
  sqlite:
    file: orelia.db
  mysql:
    host: localhost
    port: 3306
    database: orelia
    username: orelia
    password: ""
    use-ssl: false

status:
  # HP regen here (and any other HP change - damage taken, healing, ...) is applied to the
  # "scaled" HP pool (growth.HP below), then mirrored proportionally onto the player's real
  # vanilla health (which stays fixed near 20 hearts) - see ScaledHealthService.
  regen:
    hp-percent-per-tick: 0.5
    sp-percent-per-tick: 1.0
    # 100 ticks = 5 seconds
    period-ticks: 100
  leveling:
    exp-per-level: 100
    max-level: 100
  # Base value and per-level growth for each stat, used to compute base stats at a given level.
  growth:
    # This is the "scaled" HP max - it can be in the hundreds/thousands, real vanilla health
    # stays fixed near 20 hearts and is kept proportional to this instead (ScaledHealthService).
    HP:
      base: 100
      per-level: 10
    SP:
      base: 50
      per-level: 5
    ATK:
      base: 5
      per-level: 1
    DEF:
      base: 5
      per-level: 1
    CRT:
      base: 5
      per-level: 1
    CRT_DMG:
      base: 5
      per-level: 1
    SPD:
      base: 5
      per-level: 1

economy:
  starting-balance: 100.0

# Per-weapon-instance leveling (distinct from enhancement, see items.yml). A weapon starts at
# its items.yml "level:" and can be raised further via ItemApi#levelUpWeapon /
# "/ol item levelup", gated by the wielder's own character level.
weapon-level:
  # Base attack power bonus per weapon level, e.g. 0.05 = +5% per level.
  attack-power-factor: 0.05
  # Weapon level cap while the player's character level is below tier-step.
  initial-cap: 5
  # From tier-step player levels onward, the cap becomes floor(playerLevel / tier-step) *
  # tier-step - e.g. with the defaults, player level 10-19 -> weapon level cap 10, 20-29 -> 20,
  # 30-39 -> 30, and so on indefinitely.
  tier-step: 10

# Floating damage-number text (rises for duration-ticks then despawns). Works for any hit,
# not just monsters - PvP included.
combat:
  scaled-health:
    # Tagged monsters' true HP (monsters.yml "hp:") can run into the thousands for a
    # high-difficulty boss, far past what's safe to put directly into vanilla's MAX_HEALTH
    # attribute - their vanilla health is capped to this instead and kept proportional to the
    # real value (same idea as players staying at ~20 hearts regardless of their real HP pool).
    vanilla-cap: 1024
  damage-display:
    enabled: true
    duration-ticks: 20
    rise-per-tick: 0.05
    # Spawn offset from the hit location (victim's eye height by default) - negative moves it
    # down. Tune this if numbers feel like they're floating too high above the target.
    y-offset: -0.3
    normal-color: "&f"
    crit-color: "&6"
    crit-scale: 1.3

monster:
  # Cancels vanilla natural/spawner hostile mob spawning so every enemy in the world comes
  # from an Orelia monster spawn point (/oladmin spawnpoint) instead of random vanilla
  # spawns. Does not affect passive animals or Orelia's own spawns.
  disable-vanilla-hostile-spawning: true
  # Prevents tagged monsters (zombies etc.) from burning in daylight, without affecting
  # other ignition sources (lava, fire blocks, fire-elemental skills).
  sun-immunity:
    enabled: true
  # Renders every tagged monster's nametag as a live HP bar, updated after each hit
  # (MonsterHealthBarListener). {name}/{bar}/{current}/{max} placeholders in "format".
  health-bar:
    enabled: true
    length: 10
    format: "{name} &7[{bar}&7] &f{current}/{max}"
    filled-color: "&a"
    empty-color: "&8"
