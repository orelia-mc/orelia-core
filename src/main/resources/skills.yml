# Weapon skill definitions (SOW section 7). `executor-type` selects which archetype in
# rpg.skill.executor runs the skill:
#   MELEE_CONE     - damages entities in a cone in front of the caster
#   MELEE_AOE      - damages entities in a radius around the caster
#   DASH_STRIKE    - dashes forward and strikes the nearest entity hit
#   ARROW_VOLLEY   - fires one precise arrow (radius: 0) or several spread across `radius` degrees
#   EXPLOSIVE_ARROW - fires an arrow that explodes for AoE damage on impact (radius = blast radius)
#
# weapon-type: SWORD | SPEAR | AXE | BOW
# effect-particle must be a valid org.bukkit.Particle name.

